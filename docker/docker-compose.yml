# =============================================================================
# docker-compose.yml for MODCAN-GNN Pipeline
# Yêu cầu: nvidia-container-toolkit đã được cài trên host
# Khởi động: docker compose up -d
# =============================================================================

version: "3.9"

# ── Shared configurations ─────────────────────────────────────────────────────
x-common-env: &common-env
  PYTHONPATH: /workspace
  PYTHONUNBUFFERED: "1"
  CUDA_VISIBLE_DEVICES: "0"
  TZ: Asia/Ho_Chi_Minh

x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-volumes: &common-volumes
  - ../:/workspace          # Toàn bộ project mount vào /workspace
  - ../data:/workspace/data # Raw + processed data
  - ../logs:/workspace/logs # Pipeline logs

# =============================================================================
services:

  # ── Service 1: Main Pipeline Runner ───────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: modcan-gnn:latest
    container_name: modcan_pipeline
    <<: *gpu-config
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /workspace
    command: bash
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - modcan_net

  # ── Service 2: Jupyter Lab (EDA và result visualization) ──────────────────
  jupyter:
    image: modcan-gnn:latest
    container_name: modcan_jupyter
    <<: *gpu-config
    environment:
      <<: *common-env
      JUPYTER_ENABLE_LAB: "yes"
    volumes: *common-volumes
    working_dir: /workspace
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --NotebookApp.token=''
        --NotebookApp.password=''
    ports:
      - "8888:8888"
    restart: unless-stopped
    networks:
      - modcan_net
    depends_on:
      - pipeline

  # ── Service 3: Data Acquisition (R script runner) ─────────────────────────
  # Chạy một lần: docker compose run --rm data_acquisition
  data_acquisition:
    image: modcan-gnn:latest
    container_name: modcan_data_acq
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /workspace
    command: >
      bash -c "
        echo '=== Starting Data Acquisition ===' &&
        Rscript data_acquisition/download_tcga.R --cancer LUAD --outdir /workspace/data/raw/tcga_luad &&
        Rscript data_acquisition/download_tcga.R --cancer LUSC --outdir /workspace/data/raw/tcga_lusc &&
        python data_acquisition/download_ppi.py &&
        python data_acquisition/download_labels.py &&
        echo '=== Data Acquisition Complete ==='
      "
    restart: no
    networks:
      - modcan_net

  # ── Service 4: Preprocessing ───────────────────────────────────────────────
  preprocess:
    image: modcan-gnn:latest
    container_name: modcan_preprocess
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /workspace
    command: python data_acquisition/preprocess.py --config configs/config.yaml
    restart: no
    networks:
      - modcan_net

  # ── Service 5: Clustering ──────────────────────────────────────────────────
  clustering:
    image: modcan-gnn:latest
    container_name: modcan_clustering
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /workspace
    command: >
      bash -c "
        python clustering/community_cohesion.py --config configs/config.yaml &&
        python clustering/spectral_clustering.py --config configs/config.yaml
      "
    restart: no
    networks:
      - modcan_net

  # ── Service 6: GNN Training (GPU) ─────────────────────────────────────────
  train:
    image: modcan-gnn:latest
    container_name: modcan_train
    <<: *gpu-config
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /workspace
    command: python models/train.py --config configs/config.yaml
    restart: no
    networks:
      - modcan_net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  modcan_net:
    driver: bridge

# ── Volumes (named — for persistent data outside project folder if needed) ───
volumes:
  modcan_data:
    driver: local
  modcan_logs:
    driver: local
